name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run tests
        run: cargo test --no-default-features --features "encryption,audit"
      - name: Clippy
        run: cargo clippy --no-default-features --features "encryption,audit" -- -D warnings

  python-tests:
    name: Python Tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-timeout
        if: runner.os != 'Windows'
      - name: Create venv and install deps (Windows)
        run: |
          python -m venv .venv
          .venv\Scripts\pip install maturin pytest pytest-timeout
        if: runner.os == 'Windows'
      - name: Build and install
        run: .venv/bin/maturin develop --release --features "pyo3/extension-module,encryption"
        if: runner.os != 'Windows'
      - name: Build and install (Windows)
        run: .venv\Scripts\maturin develop --release --features "pyo3/extension-module,encryption"
        if: runner.os == 'Windows'
      - name: Run Python tests
        run: .venv/bin/pytest tests/ -v --timeout=60
        if: runner.os != 'Windows'
      - name: Run Python tests (Windows)
        run: .venv\Scripts\pytest tests/ -v --timeout=60
        if: runner.os == 'Windows'
