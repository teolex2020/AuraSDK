name: Build Wheels

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build wheel — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            interpreters: "3.9 3.10 3.11 3.12 3.13"
          - os: macos-14
            target: x86_64-apple-darwin
            interpreters: "3.9 3.10 3.11 3.12 3.13"
          - os: macos-latest
            target: aarch64-apple-darwin
            interpreters: "3.9 3.10 3.11 3.12 3.13"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            interpreters: "3.10 3.11 3.12 3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features "pyo3/extension-module,encryption" --interpreter ${{ matrix.interpreters }}
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

